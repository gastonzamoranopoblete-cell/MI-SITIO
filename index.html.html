<!DOCTYPE html> <!-- Documento HTML5 -->
<html>
<head>
  <base target="_top">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed&display=swap');
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Roboto Condensed', sans-serif;
      background: url('https://i.imgur.com/2kotpZJ.jpeg') no-repeat center center fixed;
      background-size: 120%;
      background-position: center center;
      color: black;
      overflow: hidden;
      user-select: none;
    }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    h1 {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 4rem;
      font-weight: 900;
      text-shadow: 1px 1px 2px white;
    }
    .subtitle {
      position: absolute;
      top: 130px;
      left: 60px;
      font-style: italic;
      font-weight: 700;
      font-size: 1.5rem;
      text-shadow: 1px 1px 2px white;
    }
    .btn {
      position: absolute;
      width: 220px;
      padding: 12px 0;
      border: 1.5px solid rgba(255,255,255,0.7);
      background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(230,230,230,0.9));
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      border-radius: 12px;
      box-shadow: 3px 3px 6px rgba(0,0,0,0.15), -3px -3px 6px rgba(255,255,255,0.7);
    }
    .btn:hover {
      background: linear-gradient(145deg, rgba(255,255,255,1), rgba(245,245,245,1));
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1), 4px 4px 8px rgba(0,0,0,0.25);
    }
    #btn1 { top: 180px; left: 60px; }
    #btn2 { top: 230px; left: 60px; }
    #btn3 { top: 280px; left: 60px; }
    #btn4 { top: 330px; left: 60px; color: darkblue; }
    #btn5 { top: 380px; left: 60px; }
    #btn6 { top: 430px; left: 60px; }
    #btnSalirGuardar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-160px);
      width: 150px;
    }
    #btnSalirSinGuardar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(20px);
      width: 150px;
    }
    #contenedorFormulario {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: white;
      overflow-y: auto;
      padding: 20px;
      box-sizing: border-box;
      z-index: 10;
    }
    .reloj {
      position: absolute;
      top: 20px;
      right: 20px;
      border: 1px solid black;
      background: rgba(255,255,255,0.8);
      padding: 8px 12px;
      font-weight: 700;
      font-family: monospace;
      width: 130px;
      text-align: center;
      box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
      border-radius: 3px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MENU PRINCIPAL</h1>
    <div class="subtitle">RECEPCION NACIONAL</div>

    <button id="btn1" class="btn">RECEPCION DE UNIDADES</button>
    <button id="btn2" class="btn">RECIBO A RENDIR</button>
    <button id="btn3" class="btn">INGRESO POR TRASPASO</button>
    <button id="btn4" class="btn">EQUIPOS ROTABLES</button>
    <button id="btn5" class="btn">INGRESO POR AJUSTE</button>
    <button id="btn6" class="btn">INGRESO MANUAL</button>

    <button id="btnSalirGuardar" class="btn">SALIR Y GUARDAR</button>
    <button id="btnSalirSinGuardar" class="btn">SALIR SIN GUARDAR</button>

    <div class="reloj">
      <div id="hora">--:--:--</div>
      <div id="fecha">--/--/----</div>
    </div>
  </div>

  <div id="contenedorFormulario"></div>

  <script>
    // Actualiza el reloj digital
    function actualizarReloj() {
      const ahora = new Date();
      const hora = ahora.toLocaleTimeString('es-CL', { hour12: false });
      const fecha = ahora.toLocaleDateString('es-CL');
      document.getElementById('hora').textContent = hora;
      document.getElementById('fecha').textContent = fecha;
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    // Evento click para btn1: carga Code.html desde GAS
    document.getElementById('btn1').onclick = () => {
  google.script.run.withSuccessHandler(function(html) {
    document.querySelector('.container').style.display = 'none';
    const contenedor = document.getElementById('contenedorFormulario');
    contenedor.innerHTML = html;
    contenedor.style.display = 'block';
  }).getFormularioHTML('Formulario'); // <- nombre exacto del archivo .html sin extensión
};
    };

    // Eventos para otros botones (no implementados aún)
    document.getElementById('btn2').onclick = () => alert("Función no implementada.");
    document.getElementById('btn3').onclick = () => alert("Función no implementada.");
    document.getElementById('btn4').onclick = () => alert("Función no implementada.");
    document.getElementById('btn5').onclick = () => alert("Función no implementada.");
    document.getElementById('btn6').onclick = () => alert("Función no implementada.");

    // Botones de salida cierran la ventana GAS
    document.getElementById('btnSalirGuardar').onclick = () => google.script.host.close();
    document.getElementById('btnSalirSinGuardar').onclick = () => google.script.host.close();
  </script>
</body>
</html>
